name: Pipeline CI (Lint, Build & Test)

on:
  pull_request:
    branches:
       [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Tests (Jest)
        run: npm test
