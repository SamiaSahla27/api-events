name: Pipeline CI (Lint, Build & Test)

on:
  pull_request:
    branches:
       [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Audit de sécurité (npm audit)
        # on ne veut pas que l'audit casse le job, on collecte simplement le rapport
        run: |
          npm audit --json > audit.json || true

      - name: Tests (Jest)
        # on génère un rapport JSON afin de l'archiver
        run: |
          npm test -- --json --outputFile=jest-report.json | tee jest-output.txt || true

      - name: Upload des rapports 📁
        uses: actions/upload-artifact@v3
        with:
          name: rapports-ci
          path: |
            jest-report.json
            jest-output.txt
            audit.json

      - name: Ajouter un lien dans le résumé 🔗
        run: |
          echo "### 📄 Rapports CI" >> $GITHUB_STEP_SUMMARY
          echo "- [Télécharger les rapports](https://github.com/${{ github.repository }}/suites/${{ github.run_id }}/artifacts)" >> $GITHUB_STEP_SUMMARY
