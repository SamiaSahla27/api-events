name: Pipeline CI (Lint, Build & Test)

on:
  push:
    branches: [integration, staging, main]
  pull_request:
    branches: [integration, staging, main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environnement cible"
        required: true
        default: Integration
        type: choice
        options:
          - Integration
          - Staging
          - Prod

jobs:
  lint-and-test-integration:
    name: Lint & Test (Integration)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'Integration') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/integration') ||
      (github.event_name == 'pull_request' && github.base_ref == 'integration')
    environment: Integration
    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
      APP_ENV: Integration
      MY_VARIABLE_INTEGRATION: ${{ vars.MY_VARIABLE_INTEGRATION }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Afficher l'environnement cible
        run: echo "Environnement=Integration"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Vérifier API_PASSWORD
        shell: bash
        run: |
          if [ -z "$API_PASSWORD" ]; then
            echo "::error::Le secret GitHub API_PASSWORD est manquant ou vide."
            exit 1
          fi

      - name: Masquer API_PASSWORD dans les logs
        run: echo "::add-mask::$API_PASSWORD"

      - name: Tests (Jest)
        run: npm test

  lint-and-test-staging:
    name: Lint & Test (Staging)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'Staging') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'pull_request' && github.base_ref == 'staging')
    environment: Staging
    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
      APP_ENV: Staging
      MY_VARIABLE_INTEGRATION: ${{ vars.MY_VARIABLE_INTEGRATION }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Afficher l'environnement cible
        run: echo "Environnement=Staging"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Vérifier API_PASSWORD
        shell: bash
        run: |
          if [ -z "$API_PASSWORD" ]; then
            echo "::error::Le secret GitHub API_PASSWORD est manquant ou vide."
            exit 1
          fi

      - name: Masquer API_PASSWORD dans les logs
        run: echo "::add-mask::$API_PASSWORD"

      - name: Tests (Jest)
        run: npm test

  lint-and-test-prod:
    name: Lint & Test (Prod)
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'Prod') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    environment: Prod
    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
      APP_ENV: Prod
      MY_VARIABLE_INTEGRATION: ${{ vars.MY_VARIABLE_INTEGRATION }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Afficher l'environnement cible
        run: echo "Environnement=Prod"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Vérifier API_PASSWORD
        shell: bash
        run: |
          if [ -z "$API_PASSWORD" ]; then
            echo "::error::Le secret GitHub API_PASSWORD est manquant ou vide."
            exit 1
          fi

      - name: Masquer API_PASSWORD dans les logs
        run: echo "::add-mask::$API_PASSWORD"

      - name: Tests (Jest)
        run: npm test
