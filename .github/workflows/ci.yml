name: Pipeline CI (Lint, Build & Test)

on:
  push:
    branches: [integration, staging, main]
  pull_request:
    branches: [integration, staging, main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Environnement cible"
        required: true
        default: Integration
        type: choice
        options:
          - Integration
          - Staging
          - Prod

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: Integration
            branch: integration
          - environment: Staging
            branch: staging
          - environment: Prod
            branch: main
    if: |
      (github.event_name == 'workflow_dispatch' && matrix.environment == inputs.target_environment) ||
      (github.event_name == 'push' && github.ref == format('refs/heads/{0}', matrix.branch)) ||
      (github.event_name == 'pull_request' && github.base_ref == matrix.branch)
    environment: ${{ matrix.environment }}
    env:
      API_PASSWORD: ${{ secrets.API_PASSWORD }}
      APP_ENV: ${{ matrix.environment }}
      MY_VARIABLE_INTEGRATION: ${{ vars.MY_VARIABLE_INTEGRATION }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Afficher l'environnement cible
        run: echo "Environnement=${{ matrix.environment }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        run: npm ci

      - name: Linter (ESLint)
        run: npm run lint

      - name: Vérifier API_PASSWORD
        shell: bash
        run: |
          if [ -z "$API_PASSWORD" ]; then
            echo "::error::Le secret GitHub API_PASSWORD est manquant ou vide."
            exit 1
          fi

      - name: Masquer API_PASSWORD dans les logs
        run: echo "::add-mask::$API_PASSWORD"

      - name: Tests (Jest)
        run: npm test
