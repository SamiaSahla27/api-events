<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events Manager</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="container">
        <h1>Gestion des événements</h1>

        <section class="panel">
            <h2 id="form-title">Créer un événement</h2>
            <form id="event-form">
                <div class="grid">
                    <label>
                        Titre *
                        <input id="title" name="title" type="text" required />
                    </label>

                    <label>
                        Date et heure *
                        <input id="date" name="date" type="datetime-local" required />
                    </label>

                    <label>
                        Lieu *
                        <input id="lieu" name="lieu" type="text" required />
                    </label>

                    <label>
                        URL image *
                        <input id="image" name="image" type="url" required placeholder="https://..." />
                    </label>

                    <label>
                        Catégorie
                        <input id="category" name="category" type="text" />
                    </label>

                    <label>
                        Capacité maximale
                        <input id="capacity" name="capacity" type="number" min="1" step="1" />
                    </label>
                </div>

                <div class="actions">
                    <button id="submit-btn" type="submit">Créer</button>
                    <button id="cancel-edit" type="button" class="secondary hidden">Annuler l'édition</button>
                </div>
            </form>
            <p id="feedback" class="feedback"></p>
        </section>

        <section class="panel">
            <div class="list-header">
                <h2>Événements existants</h2>
                <button id="refresh" type="button" class="secondary">Rafraîchir</button>
            </div>
            <div id="events-list" class="events-list"></div>
        </section>
    </main>

    <script src="./main.js"></script>
</body>

</html>
